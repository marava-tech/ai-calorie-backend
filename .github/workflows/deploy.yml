name: Deploy fitness-os-backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fitness-os-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/marava-tech/fitness-os-backend:latest
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/marava-tech/fitness-os-backend:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/marava-tech/fitness-os-backend:buildcache,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/marava-tech/fitness-os-backend:latest
            docker rm -f gympulse-backend 2>/dev/null || true
            cd /root/server-setup/services/gympulse
            docker compose --env-file ../../.env up -d --no-deps --pull never gympulse-backend
            docker image prune -f
