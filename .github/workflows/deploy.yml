name: Build & Deploy — Fitness OS Backend

on:
  push:
    branches: [main]
    paths:
      - "projects/ai-calorie-counter/backend/**"

env:
  IMAGE: ghcr.io/marava-tech/fitness-os-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: projects/ai-calorie-counter/backend
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/server-setup/services/ai-calorie-counter
            docker compose pull
            docker compose up -d --no-deps fitness-os-backend
            sleep 5
            docker compose logs --tail=20 fitness-os-backend
